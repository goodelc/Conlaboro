# ===========================================
# Conlaboro Backend - Application Configuration
# ===========================================

server:
  port: 8080

spring:
  application:
    name: conlaboro-backend
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/conlaboro
    username: conlaboro
    password: conlaboro123
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.conlaboro.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT Configuration
jwt:
  secret: conlaboro-jwt-secret-key-2026-springboot-mybatis-plus-postgresql-very-long-secret-key-for-hmac-sha256
  expiration: 86400000        # 24 hours (ms)
  header: Authorization
  prefix: "Bearer "

# AI Configuration (腾讯MaaS DeepSeek-v4-pro)
ai:
  api-key: ${AI_API_KEY}
  endpoint: https://tokenhub.tencentmaas.com/v1/chat/completions
  model: deepseek-v4-pro
  timeout: 30s

# App Custom Config
app:
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
  xp:
    thresholds: 0,100,500,1500,4000,10000,99999
