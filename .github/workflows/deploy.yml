name: Deploy to Cloud Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Build backend
        run: |
          cd backend
          mvn clean package -DskipTests

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v2
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_DOCKER_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}

      - name: Build and push frontend image
        run: |
          cd frontend
          docker build -t registry.cn-hangzhou.aliyuncs.com/conlaboro/frontend:latest .
          docker push registry.cn-hangzhou.aliyuncs.com/conlaboro/frontend:latest

      - name: Build and push backend image
        run: |
          cd backend
          docker build -t registry.cn-hangzhou.aliyuncs.com/conlaboro/backend:latest .
          docker push registry.cn-hangzhou.aliyuncs.com/conlaboro/backend:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /path/to/project
            docker-compose pull
            docker-compose up -d
            docker-compose ps
