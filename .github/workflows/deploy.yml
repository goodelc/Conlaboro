name: Deploy to Cloud Server

on:
  pull_request:
    types:
      - closed
    branches:
      - master

jobs:
  build-and-deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Build backend
        run: |
          cd backend
          mvn clean package -DskipTests

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v2
        with:
          registry: crpi-mybfxaei46yf37zf.cn-hangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_DOCKER_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}

      - name: Build and push frontend image
        run: |
          cd frontend
          docker build -t crpi-mybfxaei46yf37zf.cn-hangzhou.personal.cr.aliyuncs.com/ubuntu20_dock/conlaboro-frontend:latest .
          docker push crpi-mybfxaei46yf37zf.cn-hangzhou.personal.cr.aliyuncs.com/ubuntu20_dock/conlaboro-frontend:latest

      - name: Build and push backend image
        run: |
          cd backend
          docker build -t crpi-mybfxaei46yf37zf.cn-hangzhou.personal.cr.aliyuncs.com/ubuntu20_dock/conlaboro-backend:latest .
          docker push crpi-mybfxaei46yf37zf.cn-hangzhou.personal.cr.aliyuncs.com/ubuntu20_dock/conlaboro-backend:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 确保项目目录存在（CentOS专业路径）
            mkdir -p /opt/conlaboro
            cd /opt/conlaboro
            
            # 下载最新的docker-compose.yml文件
            if [ ! -f docker-compose.yml ]; then
              echo "Downloading docker-compose.yml..."
              curl -O https://raw.githubusercontent.com/your-username/Conlaboro/master/docker-compose.yml
            else
              echo "Updating docker-compose.yml..."
              curl -O https://raw.githubusercontent.com/your-username/Conlaboro/master/docker-compose.yml
            fi
            
            # 拉取最新镜像并启动服务
            docker compose pull
            docker compose up -d
            docker compose ps
